<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reading Journal</title>
    <link href="./Assets/CSS/form.css" type="text/css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Book Journal Form</h1>
    
    <form id="readingForm">
        <label>Book Title:</label>
        <input type="text" id="title" placeholder="What are you reading?">

        <label style="font-weight: bold; font-size: 24px;">Select Format:</label>
        <div class="format-selector">
            <label class="format-option">
                <input type="radio" name="format" value="Large Print" onclick="toggleFields()">
                <span>📖 Large Print Book</span>
            </label>
            <label class="format-option">
                <input type="radio" name="format" value="Audiobook CD" onclick="toggleFields()">
                <span>💿 Audiobook (CD)</span>
            </label>
            <label class="format-option">
                <input type="radio" name="format" value="Playaway" onclick="toggleFields()">
                <span>📟 Playaway</span>
            </label>
            <label class="format-option">
                <input type="radio" name="format" value="Both" onclick="toggleFields()">
                <span>📚 Both</span>
            </label>
        </div>

        <div id="bookFields" style="display:none; border: 1px solid #ccc; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
            <label>Current Page:</label>
            <input type="number" id="pageNumber" placeholder="e.g. 145">
        </div>

        <div id="audioFields" style="display:none; border: 1px solid #ccc; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
            <label id="audioLabel">Position:</label>
            <div style="display: flex; gap: 10px;">
                <div id="discContainer" style="width: 30%;">
                    <input type="text" id="discNum" placeholder="Disc #">
                </div>
                <div style="flex-grow: 1;">
                    <input type="text" id="trackNum" placeholder="Track/Time">
                </div>
            </div>
        </div>

        <label>Thoughts:</label>
        <textarea id="thoughts" rows="4"></textarea>

        <label>Rating:</label>
        <select id="rating">
            <option value="⭐⭐⭐⭐⭐">5 Stars - Amazing!</option>
            <option value="⭐⭐⭐⭐">4 Stars - Really Good</option>
            <option value="⭐⭐⭐">3 Stars - Okay</option>
            <option value="⭐⭐">2 Stars - Bad</option>
            <option value="⭐">1 Star - DNF</option>
        </select>

        <label>Access Key:</label>
        <input type="password" id="accessKey" placeholder="What is the Password?">

        <button type="button" id="submitBtn" onclick="addEntry()" disabled style="opacity: 0.5; cursor: not-allowed;">
            Add to Journal (Locked)
        </button>
    </form>

    <div id="historySection" style="display: none;">
        <h2>Previous Entries</h2>
        <div id="entryList"></div>
    </div>

<script src="./Assets/JS/reading_log.js"></script>

</body>
</html>
