<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex's Challenge Hub</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        
        /* Lock Screen */
        #lockScreen { text-align: center; margin-top: 80px; }
        .lock-box { border: 4px solid #333; padding: 40px; border-radius: 20px; background: white; box-shadow: 8px 8px 0px #333; }
        
        /* Tiles */
        #challengeGrid { display: grid; gap: 20px; margin-top: 20px; }
        .hub-tile { border: 3px solid #333; padding: 20px; border-radius: 15px; background: white; cursor: pointer; text-align: center; box-shadow: 4px 4px 0px #333; }
        
        /* UI Components */
        input, textarea { width: 100%; padding: 15px; border: 3px solid #333; border-radius: 10px; font-size: 1rem; box-sizing: border-box; margin-bottom: 10px; }
        .hub-button { width: 100%; padding: 15px; border: 3px solid #333; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .sync-tray { background: #e3f2fd; border: 3px dashed #0277bd; padding: 20px; border-radius: 15px; margin-top: 40px; text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="lockScreen">
        <div class="lock-box">
            <h1>🔒 LOCKED</h1>
            <input type="password" id="accessKey" placeholder="Enter Key">
        </div>
    </div>

    <div id="mainContent" class="hidden">
        <header style="text-align: center; margin-bottom: 30px;">
            <h1>CHALLENGE HUB</h1>
            <button onclick="window.showNewChallengeForm()" class="hub-button" style="background:#2e7d32; color:white;">+ START NEW GOAL</button>
        </header>

        <div id="newChallengeForm" class="hidden" style="border: 3px solid #333; padding: 20px; border-radius: 15px; background: white; margin-bottom: 20px;">
            <h3>Goal Name:</h3>
            <input type="text" id="newChallengeName" placeholder="e.g. Couch to 5K">
            <button onclick="window.createNewChallenge()" class="hub-button" style="background:#0277bd; color:white;">LAUNCH</button>
        </div>

        <div id="challengeGrid"></div>
        <div id="loggingArea" class="hidden"></div>

        <div class="sync-tray">
            <h3>💻 Device Sync</h3>
            <button onclick="window.exportData()" class="hub-button" style="background:#333; color:white;">💾 EXPORT BACKUP</button>
            <label class="hub-button" style="background:white; display:block; text-align:center;">
                📂 IMPORT BACKUP
                <input type="file" id="importFile" class="hidden" onchange="window.importData(event)">
            </label>
        </div>
    </div>
</div>

<script src="./Assets/JS/challenge.js"></script>
</body>
</html>
