<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reading Journal</title>
    <link href="./assets/css/form.css" type="text/css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* High-Contrast Styling for Astigmatism */
        body { font-family: sans-serif; background-color: #f4f4f9; padding: 20px; color: #1a1a1a; }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        
        #readingForm { 
            max-width: 600px; 
            margin: 0 auto; 
            background: white; 
            padding: 25px; 
            border: 3px solid #000; 
            border-radius: 20px; 
            box-shadow: 8px 8px 0px #000; 
        }

        label { display: block; margin-top: 15px; font-weight: bold; }
        
        input, textarea, select { 
            width: 100%; 
            padding: 12px; 
            margin-top: 5px; 
            border: 2px solid #333; 
            border-radius: 10px; 
            font-size: 1rem;
            box-sizing: border-box;
        }

        /* Format Selector Grid */
        .format-selector { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-top: 10px; 
        }
        
        .format-option { 
            border: 2px solid #333; 
            padding: 10px; 
            border-radius: 10px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            cursor: pointer;
            background: #fff;
        }

        .format-option input { width: auto; margin: 0; }

        #submitBtn { 
            width: 100%; 
            padding: 15px; 
            margin-top: 25px; 
            font-weight: bold; 
            font-size: 1.1rem; 
            border: 3px solid #000; 
            border-radius: 12px;
            transition: 0.1s;
        }

        #submitBtn:not(:disabled) { 
            background: #2e7d32; 
            color: white; 
            box-shadow: 4px 4px 0px #000; 
        }

        #submitBtn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }

        #historySection { max-width: 600px; margin: 40px auto; }
    </style>
</head>
<body>
    <h1>Book Journal</h1>
    
    <form id="readingForm">
        <label>Book Title:</label>
        <input type="text" id="title" placeholder="What are you reading?">

       <label style="font-size: 1.2rem; margin-top: 25px;">Select Format (Select all that apply):</label>
<div class="format-selector">
    <label class="format-option">
        <input type="checkbox" name="format" value="Large Print" onchange="toggleFields()">
        <span>📖 Large Print</span>
    </label>
    <label class="format-option">
        <input type="checkbox" name="format" value="KOReader" onchange="toggleFields()">
        <span>📱 KOReader</span>
    </label>
    <label class="format-option">
        <input type="checkbox" name="format" value="Audiobook CD" onchange="toggleFields()">
        <span>💿 CD (KLIM)</span>
    </label>
    <label class="format-option">
        <input type="checkbox" name="format" value="Playaway HD Light" onchange="toggleFields()">
        <span>🔦 PW HD Light</span>
    </label>
    <label class="format-option">
        <input type="checkbox" name="format" value="Playaway HD" onchange="toggleFields()">
        <span>📟 PW HD</span>
    </label>
    <label class="format-option">
        <input type="checkbox" name="format" value="Audiobookshelf" onchange="toggleFields()">
        <span>☁️ ABS Server</span>
    </label>
</div>

<div id="bookFields" style="display:none; border: 2px dashed #2e7d32; padding: 15px; border-radius: 12px; margin: 15px 0;">
    <label>Current Page:</label>
    <input type="number" id="pageNumber" placeholder="e.g. 145">
</div>

<div id="audioFields" style="display:none; border: 2px dashed #0277bd; padding: 15px; border-radius: 12px; margin: 15px 0;">
    <label id="audioLabel">Audio Progress:</label>
    <div style="display: flex; gap: 10px; margin-top: 5px;">
        <div id="discContainer" style="width: 35%;">
            <input type="text" id="discNum" placeholder="Disc #">
        </div>
        <div style="flex-grow: 1;">
            <input type="text" id="trackNum" placeholder="Track / Time">
        </div>
    </div>
</div>

        <label>Thoughts & Notes:</label>
        <textarea id="thoughts" rows="4" placeholder="Your takeaways..."></textarea>

        <label>Rating:</label>
        <select id="rating">
            <option value="⭐⭐⭐⭐⭐">5 Stars - Amazing!</option>
            <option value="⭐⭐⭐⭐">4 Stars - Really Good</option>
            <option value="⭐⭐⭐">3 Stars - Okay</option>
            <option value="⭐⭐">2 Stars - Bad</option>
            <option value="⭐">1 Star - DNF</option>
        </select>

        <label>Access Key:</label>
        <input type="password" id="accessKey" placeholder="Enter key to unlock...">

        <button type="button" id="submitBtn" onclick="addEntry()" disabled>
            Add to Journal (Locked)
        </button>
    </form>

    <div style="max-width: 600px; margin: 20px auto; padding: 20px; border: 3px dashed #333; border-radius: 15px; text-align: center; background: #e3f2fd;">
    <h3 style="margin-top: 0;">💻 Device Sync</h3>
    <p style="font-size: 0.8rem; margin-bottom: 15px;">Export your file to your HP Server, then import it on your other devices.</p>
    
    <div style="display: flex; gap: 10px; justify-content: center;">
        <button onclick="window.exportJournal()" style="background: #333; color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none;">
            💾 Export JSON
        </button>

        <label style="background: white; color: #333; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; border: 2px solid #333;">
            📂 Import JSON
            <input type="file" id="importFile" style="display: none;" onchange="window.importJournal(event)">
        </label>
    </div>
</div>

    <div id="historySection" style="display: none;">
        <h2 style="text-align: center;">Previous Entries</h2>
        <div id="entryList"></div>
    </div>

<script src="./assets/js/reading_log.js"></script>

</body>
</html>
